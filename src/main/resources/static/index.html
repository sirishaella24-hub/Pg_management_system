<!DOCTYPE html>
<html>
<head>
    <title>Eshwar Women's PG</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            color: white;
            text-align: center;

            /* Background Image */
            background: url('https://images.unsplash.com/photo-1554995207-c18c203602cb') no-repeat center center/cover;
            height: 100vh;
        }

        /* Overlay */
        .overlay {
            background: rgba(0, 0, 0, 0.6);
            height: 100%;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* Content */
        .content {
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            padding: 30px;
        }

        .header h1 {
            font-size: 40px;
        }

        /* Subtitle */
        .para {
            font-family: monospace;
            font-size: 20px;
        }

        /* Button container (VERTICAL) */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 40px;
        }

        /* Buttons */
        button {
            width: 250px;
            padding: 15px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            background: skyblue;
            color: #1e3c72;
            cursor: pointer;

            /* Start hidden left */
            transform: translateX(-300px);
            opacity: 0;

            transition: 0.3s;
        }

        /* Hover */
        button:hover {
            background: lightgray;
            transform: scale(1.05);
        }

        /* Click */
        button:active {
            background: gray;
            color: white;
        }

        /* Animation */
        @keyframes slideIn {
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* DELAYS (one by one slowly) */
        button:nth-child(1) { animation: slideIn 0.8s forwards 0.5s; }
        button:nth-child(2) { animation: slideIn 0.8s forwards 1s; }
        button:nth-child(3) { animation: slideIn 0.8s forwards 1.5s; }
        button:nth-child(4) { animation: slideIn 0.8s forwards 2s; }
        button:nth-child(5) { animation: slideIn 0.8s forwards 2.5s; }

    </style>
</head>

<body>

<div class="overlay"></div>

<div class="content">

    <div class="header">
        <h1>Welcome to Eshwar Women's PG</h1>
        <p class="para">Safe  Comfortable  Affordable Living</p>
       
    </div>

    <div class="container">

        <button onclick="goTo('register.html')">Registration</button>

        <button onclick="goTo('facilities.html')">PG Facilities</button>

        <button onclick="goTo('pricing.html')">Room & Pricing</button>

        <button onclick="goTo('payment.html')">Payment</button>

        <button onclick="goTo('contact.html')">Contact</button>

    </div>

</div>

<script>
    function goTo(page) {
        window.location.href = page;
    }
</script>

</body>
</html>
