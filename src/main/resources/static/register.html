<!DOCTYPE html>
<html>
<head>
    <title>PG Registration</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: url('https://images.unsplash.com/photo-1560448204-e02f11c3d0e2') no-repeat center center/cover;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
        }

        /* Center container */
        .main {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px 0;
        }

        /* Form box */
        form {
            background: #ffe5b4;
            padding: 20px;
            width: 340px;
            border-radius: 12px;
            box-shadow: 0 0 15px black;
        }

        /* Title */
        h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #333;
        }

        /* Inputs */
        input, select {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 14px;
        }

        /* Button */
        button {
            width: 100%;
            padding: 10px;
            background: lightgray;
            color: white;
            border: none;
            border-radius: 6px;
            margin-top: 10px;
            cursor: not-allowed;
            transition: 0.3s;
            font-size: 15px;
        }

        /* Active button */
        button.active {
            background: #2e8b57;
            cursor: pointer;
        }

        /* Hover */
        button.active:hover {
            background: green;
        }
    </style>
</head>

<body>

<div class="overlay"></div>

<div class="main">

    <form id="form">

        <h2>PG Registration</h2>

        <input type="text" id="name" placeholder="Name" required pattern="[A-Za-z ]+">

        <input type="text" id="phone" placeholder="Phone (10 digits)" required pattern="[0-9]{10}">

        <input type="email" id="email" placeholder="Email" required>
        
        <input type="date" id="joiningDate" required>

        <input type="text" id="roomNumber" placeholder="Room Number" required>

        <select id="sharingType" required>
            <option value="">Select Sharing Type</option>
            <option value="2-sharing">2 Sharing</option>
            <option value="4-sharing">4 Sharing</option>
            <option value="6-sharing">6 Sharing</option>
        </select>

        <input type="number" id="rentPaid" placeholder="Rent Paid" required>

        <button type="submit" id="submitBtn" disabled>Submit</button>

    </form>

</div>

<script>
    const form = document.getElementById("form");
    const button = document.getElementById("submitBtn");

    // Enable button when all fields are filled
    form.addEventListener("input", function() {
        let inputs = form.querySelectorAll("input, select");
        let allFilled = true;

        inputs.forEach(input => {
            if (!input.value) {
                allFilled = false;
            }
        });

        if (allFilled) {
            button.disabled = false;
            button.classList.add("active");
        } else {
            button.disabled = true;
            button.classList.remove("active");
        }
    });

    // Submit form
    form.addEventListener("submit", function(e) {
        e.preventDefault();

        let data = {
            name: document.getElementById("name").value,
            phone: document.getElementById("phone").value,
            email: document.getElementById("email").value,
            joiningDate: document.getElementById("joiningDate").value,
            roomNumber: document.getElementById("roomNumber").value,
            sharingType: document.getElementById("sharingType").value,
            rentPaid: parseInt(document.getElementById("rentPaid").value)
        };

        fetch("http://localhost:8080/tenant/add", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
            .then(res => {
                if (res.ok) {
                    return res.text();
                } else {
                    throw new Error("Failed to save");
                }
            })
            .then(() => {
                window.location.href = "success.html";
            })
            .catch((err) => {
                console.error(err);
                alert("Error while saving");
            });
    });
</script>

</body>
</html>
