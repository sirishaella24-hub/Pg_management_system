<!DOCTYPE html>
<html>
<head>
    <title>Success</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #56ab2f, #a8e063);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 350px;
            box-shadow: 0 0 20px black;
        }

        h2 {
            color: green;
        }

        p {
            margin-top: 10px;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: green;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        a:hover {
            background: darkgreen;
        }
    </style>
</head>

<body>

<div class="box">
    <h2 id="title">Success</h2>
    <p id="message">You Have Registered successfully</p>
    <p id="message">Welcome to Eswar womens pg</p>

    <a href="index.html">Back to Home</a>
</div>

<script>
    // Read type from URL
    const params = new URLSearchParams(window.location.search);
    const type = params.get("type");

    if (type === "payment") {
        document.getElementById("title").innerText = "✅ Payment Successful!";
        document.getElementById("message").innerText = "Your payment receipt has been submitted successfully.";
    } else if (type === "register") {
        document.getElementById("title").innerText = "✅ Registration Successful!";
        document.getElementById("message").innerText = "Your registration has been completed successfully.";
    }
</script>

</body>
</html>
